site_name: Claude Tips
site_description: NCloud ML Server 운영 팁 모음
site_url: ""

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - General:
    - Server:
      - HTTP Proxy (브라우저 접근): server/http_proxy.md
      - HTTP Server 실행: server/http_server.md
      - GPU 테스트: server/gpu_test.md
    - Python:
      - Persistent Conda: python/persistent_conda.md
      - Conda + uv: python/conda_uv.md
      - Plot Style Guide: python/plot_style_guide.md
    - Data:
      - 디렉토리 구조: data/directory_structure.md
      - DFT Metadata Template: data/dft_metadata.md
      - Dataset Metadata Convention: data/dataset_metadata_convention.md
  - Projects:
    - "(프로젝트별 팁은 여기에 추가)": projects/index.md
    - PySCF vs e3nn Convention: projects/pyscf_e3nn_convention.md
    - dft-dataset Toolbox: projects/dft_matrix_template.md
    - Irrep Decomposition Report: projects/irrep_decompose_report.md
    - PySCF Basis & Functionals: projects/pyscf_basis_and_functionals.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
